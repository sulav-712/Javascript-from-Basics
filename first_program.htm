<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First Program</title>
</head>
<body>
  <script>
    document.write("Hello, World!");
    document.write("BCA");
    document.write("BCA 3rd Sem");

    // This will display in same line as html ignores new line

    document.write("Hello, World! <br>");
    document.write("BCA <br>");
    document.write("BCA 3rd Sem");

    // <br> is added to break the line


    console.log("Hello, World!");
    console.log("BCA");
    console.log("BCA 3rd Sem");

    // This is another way to display output in console

    alert("Hello Sulav");

    // This will display a pop up message in the browser

    let name = prompt("Enter your name");
    alert("Hello " + name);

    document.write(name);

    // This will take input from user and displays it on browser

  </script></body>
</html>
